timeout: 120
service:
  externalPort: 3000
  internalPort: 3000
image:
  secrets:
  - name: skdigital-bonet-registry
application.migrateCommand: ["bundle", "exec", "rails", "db:migrate"]
ingress:
  annotations:
    nginx.ingress.kubernetes.io/proxy-body-size: 256m
livenessProbe:
  initialDelaySeconds: 5
  timeoutSeconds: 5
  probeType: "httpGet"
  path: "/health"
readinessProbe:
  initialDelaySeconds: 5
  timeoutSeconds: 10
  probeType: "httpGet"
  path: "/health"
resources:
  requests:
    cpu: 150m
    memory: 1Gi
  limits:
    memory: 1Gi
persistence:
  enabled: true
  volumes:
  - name: govbox-pro-trial-storage
    mount:
      path: /app/storage
    claim:
      accessMode: ReadWriteMany
      size: 10Gi
      storageClass: nfs-client
